<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header>
      <h1>TETRIS</h1>
      <div id="score-panel">
        <span class="label">SCORE</span>
        <span id="score-display">000000</span>
      </div>
    </header>

    <main>
      <!-- Game board area -->
      <div id="board-wrap">
        <canvas id="game-canvas"></canvas>

        <div id="pause-overlay" class="hidden">PAUSED</div>

        <div id="gameover-overlay" class="hidden">
          <p>GAME OVER</p>
          <p id="final-score"></p>
          <button id="btn-restart">다시 시작</button>
        </div>
      </div>

      <!-- Side panel: previews + stats + save controls -->
      <aside id="side-panel">
        <div class="preview-group">
          <span class="label">NEXT</span>
          <canvas id="next-canvas"></canvas>
        </div>
        <div class="preview-group">
          <span class="label">NEXT</span>
          <canvas id="next-next-canvas"></canvas>
        </div>

        <div id="stats">
          <div class="stat">
            <span class="label">LEVEL</span>
            <span id="level-display">01</span>
          </div>
          <div class="stat">
            <span class="label">LINES</span>
            <span id="lines-display">000</span>
          </div>
        </div>

        <div id="save-controls">
          <button id="btn-save" aria-label="Save Game">저장</button>
          <button id="btn-load" aria-label="Load Game">불러오기</button>
        </div>
      </aside>
    </main>

    <!-- Control buttons (mobile primary / desktop secondary) -->
    <div id="controls">
      <button id="btn-left"   aria-label="Move Left">&#9664;</button>
      <button id="btn-rotate" aria-label="Rotate (tap) / Hard Drop (hold)">&#10227;</button>
      <button id="btn-right"  aria-label="Move Right">&#9654;</button>
    </div>

  </div><!-- /#app -->

  <!-- Save modal -->
  <div id="save-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="게임 저장">
    <div class="modal-content">
      <h2>게임 저장</h2>
      <textarea id="save-code" readonly aria-label="저장 코드"></textarea>
      <div class="modal-actions">
        <button id="btn-copy">코드 복사</button>
        <button id="btn-save-close">닫기</button>
      </div>
    </div>
  </div>

  <!-- Load modal -->
  <div id="load-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="게임 불러오기">
    <div class="modal-content">
      <h2>게임 불러오기</h2>
      <textarea id="load-code" placeholder="TG1:..." aria-label="저장 코드 입력"></textarea>
      <p id="load-error" class="error hidden" role="alert"></p>
      <div class="modal-actions">
        <button id="btn-load-confirm">불러오기</button>
        <button id="btn-load-close">닫기</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
